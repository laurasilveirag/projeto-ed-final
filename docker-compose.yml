version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: streaming_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streaming}
      POSTGRES_USER: ${POSTGRES_USER:-streaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streaming123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/00_create_databases.sql:/docker-entrypoint-initdb.d/00_create_databases.sql:ro
      - ./sql/01_ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streaming} -d ${POSTGRES_DB:-streaming}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: streaming_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  seed:
    build:
      context: .
      dockerfile: docker/seed/Dockerfile
    container_name: streaming_seed
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-streaming}
      POSTGRES_USER: ${POSTGRES_USER:-streaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streaming123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- Airflow (webserver + scheduler compartilham a mesma imagem customizada) ---
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: streaming_airflow_init
    entrypoint: bash -c "airflow db migrate && airflow users create --username ${AIRFLOW_USER:-admin} --password ${AIRFLOW_PASSWORD:-admin} --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-streaming}:${POSTGRES_PASSWORD:-streaming123}@postgres/${AIRFLOW_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-supersecret}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-streaming}
      POSTGRES_USER: ${POSTGRES_USER:-streaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streaming123}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: streaming_airflow_webserver
    command: webserver
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: streaming_airflow_scheduler
    command: scheduler
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-init
    restart: unless-stopped

  # --- Metabase (BI) ---
  metabase:
    image: metabase/metabase:v0.50.15
    container_name: streaming_metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB:-metabase}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-streaming}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-streaming123}
      MB_DB_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
